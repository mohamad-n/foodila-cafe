# Host nginx reverse proxy for foodila.ir → the Dockerized café-menu stack.
# Use this when the server ALREADY runs nginx (Plan B). The compose stack publishes each upstream on
# localhost; this config terminates TLS and proxies the three hostnames to those ports.
#
#   foodila.ir       → 127.0.0.1:3100   (app: admin + public menu)
#   cdn.foodila.ir   → 127.0.0.1:8100   (imgproxy: signed image transforms)
#   s3.foodila.ir    → 127.0.0.1:9100   (MinIO: browser presigned uploads only)
#
# (Ports = APP_HOST_PORT / IMGPROXY_HOST_PORT / S3_HOST_PORT in .env.production; defaults shown.)
#
# Install:
#   sudo cp nginx/host/foodila.ir.conf /etc/nginx/sites-available/foodila.ir.conf
#   sudo ln -s /etc/nginx/sites-available/foodila.ir.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then issue TLS with the host certbot nginx plugin (it rewrites these blocks to add 443 + redirect):
#   sudo certbot --nginx -d foodila.ir -d cdn.foodila.ir -d s3.foodila.ir
#
# NOTE: define this `map` ONCE per nginx instance (http{} scope). If another site file already has a
# `$connection_upgrade` map, delete this block to avoid a "duplicate map" error.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── App: admin + public menu ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name foodila.ir;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # NextAuth trusts this (AUTH_TRUST_HOST=true)
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# ── imgproxy: signed image transforms (content-addressed → cache hard) ────────
server {
    listen 80;
    listen [::]:80;
    server_name cdn.foodila.ir;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}

# ── MinIO: browser presigned uploads ONLY ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name s3.foodila.ir;

    # Photos can be a few MB; stream straight through without buffering to disk.
    client_max_body_size 30m;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        # Host MUST be preserved unchanged: MinIO re-verifies the SigV4 presign against the host the app
        # signed with (s3.foodila.ir, path-style). Rewriting Host or the URI breaks every upload.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
        proxy_read_timeout    300;
    }
}
